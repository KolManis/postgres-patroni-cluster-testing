services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    environment:
      ETCD_NAME: etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: patroni-cluster
      ETCD_ENABLE_V2: "true"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd-data
    networks:
      - patroni-net

  patroni-1:
    image: postgres-patroni:cluster
    container_name: patroni-1
    environment:
      PATRONI_NAME: patroni-1
    volumes:
      - data1:/var/lib/postgresql/data
    ports:
      - "5432:5432"
      - "8008:8008"
    networks:
      - patroni-net
    depends_on:
      - etcd

  patroni-2:
    image: postgres-patroni:cluster
    container_name: patroni-2
    environment:
      PATRONI_NAME: patroni-2
    volumes:
      - data2:/var/lib/postgresql/data
    ports:
      - "5433:5432"
      - "8009:8008"
    networks:
      - patroni-net
    depends_on:
      - etcd

  patroni-3:
    image: postgres-patroni:cluster
    container_name: patroni-3
    environment:
      PATRONI_NAME: patroni-3
    volumes:
      - data3:/var/lib/postgresql/data
    ports:
      - "5434:5432"
      - "8010:8008"
    networks:
      - patroni-net
    depends_on:
      - etcd

  haproxy:
    image: haproxy:2.7
    container_name: haproxy
    ports:
      - "5435:5432"
      - "8011:8008"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - patroni-net
    depends_on:
      - patroni-1
      - patroni-2
      - patroni-3

volumes:
  etcd_data:
  data1:
  data2:
  data3:

networks:
  patroni-net:
    driver: bridge